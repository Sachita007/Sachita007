<svg width="1200" height="310" viewBox="0 0 1200 310" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Sachita's engineering toolchain</title>
  <desc id="desc">A dark interface panel grouping languages, product technologies, systems tools, and engineering practices.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="310"><stop stop-color="#070A12"/><stop offset=".55" stop-color="#0B1020"/><stop offset="1" stop-color="#07141A"/></linearGradient>
    <linearGradient id="edge"><stop stop-color="#8B5CF6"/><stop offset=".5" stop-color="#22D3EE"/><stop offset="1" stop-color="#34D399"/></linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path d="M28 0H0V28" stroke="#94A3B8" stroke-opacity=".045"/></pattern>
    <style>.cap{font:600 12px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;letter-spacing:1.6px}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.sans{font-family:Inter,ui-sans-serif,system-ui,sans-serif}.item{font:500 13px Inter,ui-sans-serif,system-ui,sans-serif}</style>
  </defs>
  <rect width="1200" height="310" rx="24" fill="url(#bg)"/><rect width="1200" height="310" rx="24" fill="url(#grid)"/><rect x="1" y="1" width="1198" height="308" rx="23" stroke="url(#edge)" stroke-opacity=".36" stroke-width="2"/>
  <circle cx="34" cy="32" r="5" fill="#A78BFA"/><text x="52" y="37" fill="#C4B5FD" class="cap">ENGINEERING.TOOLCHAIN</text><text x="1160" y="37" fill="#475569" text-anchor="end" class="cap">FULL-STACK // SYSTEMS // AI</text><path d="M28 58H1172" stroke="#334155" stroke-opacity=".7"/>

  <g transform="translate(30 84)"><rect width="265" height="190" rx="16" fill="#0D1424" stroke="#8B5CF6" stroke-opacity=".36"/><circle cx="24" cy="27" r="5" fill="#A78BFA"/><text x="40" y="32" fill="#C4B5FD" class="cap">LANGUAGES</text><path d="M20 50H245" stroke="#334155"/><text x="20" y="82" fill="#E2E8F0" class="item">TypeScript</text><text x="20" y="111" fill="#E2E8F0" class="item">JavaScript</text><text x="20" y="140" fill="#E2E8F0" class="item">Python</text><text x="20" y="169" fill="#64748B" class="mono" font-size="10">typed · expressive · practical</text></g>
  <g transform="translate(320 84)"><rect width="265" height="190" rx="16" fill="#0D1424" stroke="#22D3EE" stroke-opacity=".36"/><circle cx="24" cy="27" r="5" fill="#22D3EE"/><text x="40" y="32" fill="#67E8F9" class="cap">PRODUCT</text><path d="M20 50H245" stroke="#334155"/><text x="20" y="82" fill="#E2E8F0" class="item">Next.js · React</text><text x="20" y="111" fill="#E2E8F0" class="item">Node.js · Express</text><text x="20" y="140" fill="#E2E8F0" class="item">REST APIs · Auth</text><text x="20" y="169" fill="#64748B" class="mono" font-size="10">interfaces → services → outcomes</text></g>
  <g transform="translate(610 84)"><rect width="265" height="190" rx="16" fill="#0D1424" stroke="#34D399" stroke-opacity=".36"/><circle cx="24" cy="27" r="5" fill="#34D399"/><text x="40" y="32" fill="#6EE7B7" class="cap">SYSTEMS</text><path d="M20 50H245" stroke="#334155"/><text x="20" y="82" fill="#E2E8F0" class="item">PostgreSQL · MongoDB</text><text x="20" y="111" fill="#E2E8F0" class="item">Docker · RabbitMQ</text><text x="20" y="140" fill="#E2E8F0" class="item">Nginx · Linux · Git</text><text x="20" y="169" fill="#64748B" class="mono" font-size="10">data · events · infrastructure</text></g>
  <g transform="translate(900 84)"><rect width="270" height="190" rx="16" fill="#0D1424" stroke="#F59E0B" stroke-opacity=".36"/><circle cx="24" cy="27" r="5" fill="#F59E0B"/><text x="40" y="32" fill="#FCD34D" class="cap">PRACTICE</text><path d="M20 50H250" stroke="#334155"/><text x="20" y="82" fill="#E2E8F0" class="item">Context engineering</text><text x="20" y="111" fill="#E2E8F0" class="item">Tool orchestration</text><text x="20" y="140" fill="#E2E8F0" class="item">Verification loops</text><text x="20" y="169" fill="#64748B" class="mono" font-size="10">clarity · evidence · iteration</text></g>
