<svg width="1200" height="620" viewBox="0 0 1200 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Sachita Nand — Agentic Developer</title>
  <desc id="desc">An animated agent orchestration system connecting context, planning, tools, verification, and learning around a human-directed agentic core.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070A12"/>
      <stop offset="0.52" stop-color="#0B1020"/>
      <stop offset="1" stop-color="#07141A"/>
    </linearGradient>
    <linearGradient id="accent" x1="410" y1="220" x2="790" y2="470" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A78BFA"/>
      <stop offset="0.5" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8B5CF6" stop-opacity="0.1"/>
      <stop offset="0.5" stop-color="#22D3EE" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#34D399" stop-opacity="0.1"/>
    </linearGradient>
    <radialGradient id="coreGlow">
      <stop stop-color="#22D3EE" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" stroke="#94A3B8" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22D3EE" fill-opacity="0.72"/>
    </marker>
    <style>
      .label { font: 600 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; letter-spacing: 1.7px; }
      .body { font: 500 12px Inter, ui-sans-serif, system-ui, sans-serif; }
      .flow { stroke-dasharray: 7 10; animation: dash 8s linear infinite; }
      .flow-reverse { stroke-dasharray: 7 10; animation: dash-reverse 8s linear infinite; }
      .pulse { transform-box: fill-box; transform-origin: center; animation: pulse 2.6s ease-in-out infinite; }
      .blink { animation: blink 1.8s ease-in-out infinite; }
      @keyframes dash { to { stroke-dashoffset: -170; } }
      @keyframes dash-reverse { to { stroke-dashoffset: 170; } }
      @keyframes pulse { 0%, 100% { opacity: .45; transform: scale(.96); } 50% { opacity: 1; transform: scale(1.04); } }
      @keyframes blink { 0%, 100% { opacity: .35; } 50% { opacity: 1; } }
    </style>
  </defs>

  <rect width="1200" height="620" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="620" rx="28" fill="url(#grid)"/>
  <rect x="1" y="1" width="1198" height="618" rx="27" stroke="url(#accent)" stroke-opacity="0.42" stroke-width="2"/>

  <circle cx="600" cy="356" r="236" fill="url(#coreGlow)" opacity="0.72"/>
  <circle cx="600" cy="356" r="161" stroke="#22D3EE" stroke-opacity="0.12"/>
  <circle cx="600" cy="356" r="205" stroke="#A78BFA" stroke-opacity="0.08" stroke-dasharray="3 10"/>

  <g>
    <circle cx="50" cy="48" r="5" fill="#34D399" class="blink"/>
    <text x="68" y="53" fill="#94A3B8" class="label">SYSTEM ONLINE</text>
    <text x="1150" y="53" fill="#475569" text-anchor="end" class="label">SN // 007</text>
    <text x="50" y="100" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="38" font-weight="760" letter-spacing="1">SACHITA NAND</text>
    <text x="50" y="128" fill="#22D3EE" class="label">AGENTIC DEVELOPER · FULL-STACK ENGINEER · PRODUCT BUILDER</text>
    <path d="M50 151H1150" stroke="#334155" stroke-opacity="0.7"/>
  </g>

  <path id="p1" d="M292 230 C410 230 430 290 500 330" stroke="url(#line)" stroke-width="2" class="flow" marker-end="url(#arrow)"/>
  <path id="p2" d="M908 230 C790 230 770 290 700 330" stroke="url(#line)" stroke-width="2" class="flow-reverse" marker-end="url(#arrow)"/>
  <path id="p3" d="M292 370 C410 370 430 360 490 356" stroke="url(#line)" stroke-width="2" class="flow" marker-end="url(#arrow)"/>
  <path id="p4" d="M908 370 C790 370 770 360 710 356" stroke="url(#line)" stroke-width="2" class="flow-reverse" marker-end="url(#arrow)"/>
  <path id="p5" d="M352 510 C455 500 470 430 525 402" stroke="url(#line)" stroke-width="2" class="flow-reverse" marker-end="url(#arrow)"/>
  <path id="p6" d="M848 510 C745 500 730 430 675 402" stroke="url(#line)" stroke-width="2" class="flow" marker-end="url(#arrow)"/>

  <g filter="url(#glow)">
    <circle r="4" fill="#22D3EE"><animateMotion dur="4.8s" repeatCount="indefinite"><mpath href="#p1"/></animateMotion></circle>
    <circle r="4" fill="#A78BFA"><animateMotion dur="5.4s" repeatCount="indefinite"><mpath href="#p2"/></animateMotion></circle>
    <circle r="4" fill="#34D399"><animateMotion dur="4.2s" repeatCount="indefinite"><mpath href="#p5"/></animateMotion></circle>
    <circle r="4" fill="#22D3EE"><animateMotion dur="5.1s" repeatCount="indefinite"><mpath href="#p6"/></animateMotion></circle>
  </g>

  <g transform="translate(62 188)">
    <rect width="230" height="84" rx="14" fill="#0F172A" fill-opacity="0.92" stroke="#8B5CF6" stroke-opacity="0.48"/>
    <circle cx="25" cy="25" r="6" fill="#A78BFA"/>
    <text x="43" y="30" fill="#C4B5FD" class="label">01 · CONTEXT</text>
    <text x="20" y="57" fill="#94A3B8" class="body">Ground decisions in real signals</text>
  </g>
  <g transform="translate(908 188)">
    <rect width="230" height="84" rx="14" fill="#0F172A" fill-opacity="0.92" stroke="#22D3EE" stroke-opacity="0.48"/>
    <circle cx="25" cy="25" r="6" fill="#22D3EE"/>
    <text x="43" y="30" fill="#67E8F9" class="label">02 · PLAN</text>
    <text x="20" y="57" fill="#94A3B8" class="body">Decompose intent into clear work</text>
  </g>
  <g transform="translate(62 328)">
    <rect width="230" height="84" rx="14" fill="#0F172A" fill-opacity="0.92" stroke="#22D3EE" stroke-opacity="0.48"/>
    <circle cx="25" cy="25" r="6" fill="#22D3EE"/>
    <text x="43" y="30" fill="#67E8F9" class="label">03 · TOOL USE</text>
    <text x="20" y="57" fill="#94A3B8" class="body">Read · reason · edit · execute</text>
  </g>
  <g transform="translate(908 328)">
    <rect width="230" height="84" rx="14" fill="#0F172A" fill-opacity="0.92" stroke="#34D399" stroke-opacity="0.48"/>
    <circle cx="25" cy="25" r="6" fill="#34D399"/>
    <text x="43" y="30" fill="#6EE7B7" class="label">04 · ORCHESTRATE</text>
    <text x="20" y="57" fill="#94A3B8" class="body">Coordinate specialized workflows</text>
  </g>
  <g transform="translate(122 468)">
    <rect width="230" height="84" rx="14" fill="#0F172A" fill-opacity="0.92" stroke="#F59E0B" stroke-opacity="0.48"/>
    <circle cx="25" cy="25" r="6" fill="#F59E0B"/>
    <text x="43" y="30" fill="#FCD34D" class="label">05 · VERIFY</text>
    <text x="20" y="57" fill="#94A3B8" class="body">Tests and evidence close the loop</text>
  </g>
  <g transform="translate(848 468)">
    <rect width="290" height="84" rx="14" fill="#0F172A" fill-opacity="0.92" stroke="#34D399" stroke-opacity="0.48"/>
    <circle cx="25" cy="25" r="6" fill="#34D399"/>
    <text x="43" y="30" fill="#6EE7B7" class="label">06 · SHIP + LEARN</text>
    <text x="20" y="57" fill="#94A3B8" class="body">Deliver value, capture signal, improve</text>
  </g>

  <g class="pulse">
    <circle cx="600" cy="356" r="112" fill="#07111D" stroke="url(#accent)" stroke-width="2"/>
    <circle cx="600" cy="356" r="98" stroke="#22D3EE" stroke-opacity="0.22" stroke-dasharray="2 7"/>
  </g>
  <g filter="url(#glow)">
    <path d="M600 278L669 317V395L600 434L531 395V317L600 278Z" fill="#0A1624" stroke="url(#accent)" stroke-width="2"/>
  </g>
  <circle cx="600" cy="331" r="5" fill="#22D3EE" class="blink"/>
  <text x="600" y="355" fill="#F8FAFC" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="750" letter-spacing="2">AGENTIC</text>
  <text x="600" y="381" fill="#67E8F9" text-anchor="middle" class="label">DEVELOPER CORE</text>
  <text x="600" y="404" fill="#64748B" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10">HUMAN-DIRECTED</text>

  <g transform="translate(418 576)">
    <rect width="364" height="25" rx="12.5" fill="#111827" stroke="#334155"/>
    <circle cx="18" cy="12.5" r="3" fill="#34D399"/>
    <text x="31" y="16" fill="#94A3B8" font-family="ui-monospace, monospace" font-size="9.5" letter-spacing="1">INTENT → ACTION → EVIDENCE → LEARNING</text>
  </g>
</svg>
