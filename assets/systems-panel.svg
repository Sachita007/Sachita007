<svg width="1200" height="430" viewBox="0 0 1200 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Sachita's intelligent systems</title>
  <desc id="desc">A dark control panel presenting DevSync, MicroChat, and Budget Tracker as connected software systems.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="430"><stop stop-color="#070A12"/><stop offset=".55" stop-color="#0B1020"/><stop offset="1" stop-color="#07141A"/></linearGradient>
    <linearGradient id="edge"><stop stop-color="#8B5CF6"/><stop offset=".5" stop-color="#22D3EE"/><stop offset="1" stop-color="#34D399"/></linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path d="M28 0H0V28" stroke="#94A3B8" stroke-opacity=".045"/></pattern>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>.cap{font:600 12px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;letter-spacing:1.6px}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.sans{font-family:Inter,ui-sans-serif,system-ui,sans-serif}.body{font:500 13px Inter,ui-sans-serif,system-ui,sans-serif}.flow{stroke-dasharray:6 9;animation:dash 7s linear infinite}@keyframes dash{to{stroke-dashoffset:-150}}</style>
  </defs>
  <rect width="1200" height="430" rx="24" fill="url(#bg)"/><rect width="1200" height="430" rx="24" fill="url(#grid)"/><rect x="1" y="1" width="1198" height="428" rx="23" stroke="url(#edge)" stroke-opacity=".36" stroke-width="2"/>
  <circle cx="34" cy="32" r="5" fill="#22D3EE"/><text x="52" y="37" fill="#67E8F9" class="cap">INTELLIGENT.SYSTEMS</text><text x="1160" y="37" fill="#475569" text-anchor="end" class="cap">3 SYSTEMS // ONLINE</text><path d="M28 58H1172" stroke="#334155" stroke-opacity=".7"/>

  <path d="M390 213H425" stroke="#22D3EE" stroke-opacity=".6" class="flow"/><path d="M775 213H810" stroke="#34D399" stroke-opacity=".6" class="flow"/>
  <circle cx="407" cy="213" r="4" fill="#22D3EE" filter="url(#glow)"/><circle cx="792" cy="213" r="4" fill="#34D399" filter="url(#glow)"/>

  <g transform="translate(35 84)">
    <rect width="355" height="285" rx="18" fill="#0D1424" stroke="#8B5CF6" stroke-opacity=".42"/>
    <rect x="20" y="20" width="44" height="25" rx="12.5" fill="#241B3B"/><text x="42" y="37" fill="#C4B5FD" text-anchor="middle" class="mono" font-size="11">01</text>
    <circle cx="315" cy="32" r="5" fill="#34D399"/><text x="300" y="36" fill="#64748B" text-anchor="end" class="mono" font-size="9">LIVE</text>
    <text x="20" y="88" fill="#F8FAFC" class="sans" font-size="25" font-weight="740">DevSync</text>
    <text x="20" y="114" fill="#A78BFA" class="cap">AI DEVELOPER INTELLIGENCE</text>
    <path d="M20 136H335" stroke="#334155"/>
    <text x="20" y="167" fill="#CBD5E1" class="body">Semantic code Q&amp;A and repository</text><text x="20" y="190" fill="#CBD5E1" class="body">insights. Meetings become summaries,</text><text x="20" y="213" fill="#CBD5E1" class="body">decisions, and actionable work.</text>
    <rect x="20" y="239" width="88" height="25" rx="12.5" fill="#111827" stroke="#334155"/><text x="64" y="256" fill="#94A3B8" text-anchor="middle" class="mono" font-size="10">NEXT.JS</text><rect x="116" y="239" width="92" height="25" rx="12.5" fill="#111827" stroke="#334155"/><text x="162" y="256" fill="#94A3B8" text-anchor="middle" class="mono" font-size="10">GEMINI AI</text><rect x="216" y="239" width="119" height="25" rx="12.5" fill="#111827" stroke="#334155"/><text x="275" y="256" fill="#94A3B8" text-anchor="middle" class="mono" font-size="10">POSTGRESQL</text>
  </g>

  <g transform="translate(425 84)">
    <rect width="350" height="285" rx="18" fill="#0D1424" stroke="#22D3EE" stroke-opacity=".42"/>
    <rect x="20" y="20" width="44" height="25" rx="12.5" fill="#102936"/><text x="42" y="37" fill="#67E8F9" text-anchor="middle" class="mono" font-size="11">02</text>
    <circle cx="310" cy="32" r="5" fill="#22D3EE"/><text x="295" y="36" fill="#64748B" text-anchor="end" class="mono" font-size="9">EVENTS</text>
    <text x="20" y="88" fill="#F8FAFC" class="sans" font-size="25" font-weight="740">MicroChat</text>
    <text x="20" y="114" fill="#22D3EE" class="cap">REAL-TIME MICROSERVICES</text>
    <path d="M20 136H330" stroke="#334155"/>
    <text x="20" y="167" fill="#CBD5E1" class="body">Real-time messaging through isolated</text><text x="20" y="190" fill="#CBD5E1" class="body">services, event-driven communication,</text><text x="20" y="213" fill="#CBD5E1" class="body">and containerized infrastructure.</text>
    <rect x="20" y="239" width="88" height="25" rx="12.5" fill="#111827" stroke="#334155"/><text x="64" y="256" fill="#94A3B8" text-anchor="middle" class="mono" font-size="10">NODE.JS</text><rect x="116" y="239" width="102" height="25" rx="12.5" fill="#111827" stroke="#334155"/><text x="167" y="256" fill="#94A3B8" text-anchor="middle" class="mono" font-size="10">RABBITMQ</text><rect x="226" y="239" width="104" height="25" rx="12.5" fill="#111827" stroke="#334155"/><text x="278" y="256" fill="#94A3B8" text-anchor="middle" class="mono" font-size="10">DOCKER</text>
  </g>

  <g transform="translate(810 84)">
    <rect width="355" height="285" rx="18" fill="#0D1424" stroke="#34D399" stroke-opacity=".42"/>
    <rect x="20" y="20" width="44" height="25" rx="12.5" fill="#102C29"/><text x="42" y="37" fill="#6EE7B7" text-anchor="middle" class="mono" font-size="11">03</text>
    <circle cx="315" cy="32" r="5" fill="#34D399"/><text x="300" y="36" fill="#64748B" text-anchor="end" class="mono" font-size="9">LIVE</text>
    <text x="20" y="88" fill="#F8FAFC" class="sans" font-size="25" font-weight="740">Budget Tracker</text>
    <text x="20" y="114" fill="#34D399" class="cap">DATA-RICH PRODUCT</text>
    <path d="M20 136H335" stroke="#334155"/>
    <text x="20" y="167" fill="#CBD5E1" class="body">Secure finance workflows with visual</text><text x="20" y="190" fill="#CBD5E1" class="body">analytics, robust data modeling, and</text><text x="20" y="213" fill="#CBD5E1" class="body">exportable transaction intelligence.</text>
    <rect x="20" y="239" width="88" height="25" rx="12.5" fill="#111827" stroke="#334155"/><text x="64" y="256" fill="#94A3B8" text-anchor="middle" class="mono" font-size="10">NEXT.JS</text><rect x="116" y="239" width="92" height="25" rx="12.5" fill="#111827" stroke="#334155"/><text x="162" y="256" fill="#94A3B8" text-anchor="middle" class="mono" font-size="10">PRISMA</text><rect x="216" y="239" width="119" height="25" rx="12.5" fill="#111827" stroke="#334155"/><text x="275" y="256" fill="#94A3B8" text-anchor="middle" class="mono" font-size="10">TYPESCRIPT</text>
  </g>

  <text x="600" y="405" fill="#475569" text-anchor="middle" class="cap">PRODUCT THINKING × DISTRIBUTED SYSTEMS × INTELLIGENT WORKFLOWS</text>
</svg>
