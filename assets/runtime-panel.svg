<svg width="1200" height="390" viewBox="0 0 1200 390" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Sachita's agent runtime</title>
  <desc id="desc">A dark interface panel showing Sachita's identity, human-agent operating model, and verification loop.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="390"><stop stop-color="#070A12"/><stop offset=".55" stop-color="#0B1020"/><stop offset="1" stop-color="#07141A"/></linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#8B5CF6"/><stop offset=".5" stop-color="#22D3EE"/><stop offset="1" stop-color="#34D399"/></linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path d="M28 0H0V28" stroke="#94A3B8" stroke-opacity=".045"/></pattern>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.sans{font-family:Inter,ui-sans-serif,system-ui,sans-serif}.cap{font:600 12px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;letter-spacing:1.6px}.small{font:500 12px Inter,ui-sans-serif,system-ui,sans-serif}.pulse{animation:pulse 2s ease-in-out infinite}@keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
    </style>
  </defs>
  <rect width="1200" height="390" rx="24" fill="url(#bg)"/><rect width="1200" height="390" rx="24" fill="url(#grid)"/><rect x="1" y="1" width="1198" height="388" rx="23" stroke="url(#edge)" stroke-opacity=".36" stroke-width="2"/>
  <circle cx="34" cy="32" r="5" fill="#34D399" class="pulse"/><text x="52" y="37" fill="#6EE7B7" class="cap">AGENT.RUNTIME</text><text x="1160" y="37" fill="#475569" text-anchor="end" class="cap">ACTIVE // HUMAN-DIRECTED</text><path d="M28 58H1172" stroke="#334155" stroke-opacity=".7"/>

  <g transform="translate(30 82)">
    <rect width="360" height="220" rx="16" fill="#0D1424" stroke="#8B5CF6" stroke-opacity=".35"/>
    <text x="24" y="34" fill="#C4B5FD" class="cap">IDENTITY</text>
    <text x="24" y="79" fill="#F8FAFC" class="sans" font-size="27" font-weight="750">Sachita Nand</text>
    <text x="24" y="107" fill="#67E8F9" class="cap">AGENTIC DEVELOPER</text>
    <path d="M24 130H336" stroke="#334155"/>
    <text x="24" y="158" fill="#64748B" class="cap">LOCATION</text><text x="330" y="158" fill="#CBD5E1" text-anchor="end" class="small">India</text>
    <text x="24" y="188" fill="#64748B" class="cap">CRAFT</text><text x="330" y="188" fill="#CBD5E1" text-anchor="end" class="small">Full-stack engineering</text>
  </g>

  <g transform="translate(415 82)">
    <rect width="755" height="220" rx="16" fill="#0D1424" stroke="#22D3EE" stroke-opacity=".28"/>
    <text x="24" y="34" fill="#67E8F9" class="cap">OPERATING MODEL</text>
    <g transform="translate(24 57)"><rect width="218" height="130" rx="13" fill="#11192A" stroke="#A78BFA" stroke-opacity=".38"/><circle cx="22" cy="23" r="5" fill="#A78BFA"/><text x="38" y="28" fill="#C4B5FD" class="cap">HUMAN</text><text x="18" y="61" fill="#CBD5E1" class="small">Intent · taste · judgment</text><text x="18" y="84" fill="#CBD5E1" class="small">Accountability · direction</text><text x="18" y="110" fill="#64748B" class="mono" font-size="10">owns the outcome</text></g>
    <g transform="translate(267 57)"><rect width="218" height="130" rx="13" fill="#11192A" stroke="#22D3EE" stroke-opacity=".38"/><circle cx="22" cy="23" r="5" fill="#22D3EE"/><text x="38" y="28" fill="#67E8F9" class="cap">AGENT</text><text x="18" y="61" fill="#CBD5E1" class="small">Context · planning · tools</text><text x="18" y="84" fill="#CBD5E1" class="small">Execution · adaptation</text><text x="18" y="110" fill="#64748B" class="mono" font-size="10">amplifies the work</text></g>
    <g transform="translate(510 57)"><rect width="218" height="130" rx="13" fill="#11192A" stroke="#34D399" stroke-opacity=".38"/><circle cx="22" cy="23" r="5" fill="#34D399"/><text x="38" y="28" fill="#6EE7B7" class="cap">PROOF</text><text x="18" y="61" fill="#CBD5E1" class="small">Tests · runtime evidence</text><text x="18" y="84" fill="#CBD5E1" class="small">Real user outcomes</text><text x="18" y="110" fill="#64748B" class="mono" font-size="10">closes the loop</text></g>
  </g>

  <g transform="translate(250 329)"><rect width="700" height="36" rx="18" fill="#0F172A" stroke="#334155"/><text x="350" y="23" fill="#94A3B8" text-anchor="middle" class="cap">OBSERVE  →  PLAN  →  ACT WITH TOOLS  →  VERIFY  →  LEARN</text></g>
</svg>
